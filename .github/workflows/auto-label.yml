# .github/workflows/auto-label.yml
name: NSOC Issue Automation

on:
  issues:
    types: [opened]

jobs:
  auto-label:
    runs-on: ubuntu-latest

    steps:
      - name: Auto Label Issues
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || "").toLowerCase();

            let labels = ["NSOC'26"];

            // TYPE DETECTION
            if (title.includes("bug") || body.includes("error") || body.includes("issue")) {
              labels.push("bug");
            }
            if (title.includes("feature") || body.includes("enhancement") || body.includes("add")) {
              labels.push("feature");
            }
            if (title.includes("doc") || body.includes("readme") || body.includes("documentation")) {
              labels.push("documentation");
            }

            // LEVEL DETECTION (fallback if template not used)
            if (body.includes("easy")) {
              labels.push("level1");
            } else if (body.includes("medium")) {
              labels.push("level2");
            } else if (body.includes("hard")) {
              labels.push("level3");
            }

            github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.issue.number,
              labels
            });